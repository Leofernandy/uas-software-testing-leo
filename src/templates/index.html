<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Task App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Google Font Modern */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root {
            --primary-color: #4361ee;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f1c40f;
            --bg-soft: #f4f7fe;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #2b2d42;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #3046bc;
            transform: translateY(-2px);
        }

        /* Status Styling */
        .list-group-item {
            border: none;
            border-radius: 16px !important;
            margin-bottom: 12px;
            padding: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            border-left: 6px solid #e2e8f0;
            transition: 0.3s;
        }

        .task-done {
            border-left-color: var(--success-color) !important;
            background-color: #f0fdf4 !important;
        }

        .task-inprogress {
            border-left-color: var(--warning-color) !important;
            background-color: #fffbeb !important;
        }

        .task-overdue {
            border-left-color: var(--danger-color) !important;
            background-color: #fef2f2 !important;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container mt-5" id="authSection" style="max-width: 400px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4 fw-bold text-primary">Task Manager</h3>
            <form id="authForm">
                <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
                <input type="password" id="password" class="form-control mb-3" placeholder="Password (Min 8)" required>
                <button type="button" class="btn btn-primary w-100 mb-2" onclick="handleAuth('/api/login')">Login</button>
                <button type="button" class="btn btn-outline-secondary w-100 border-0" onclick="handleAuth('/api/register')">Daftar Akun Baru</button>
            </form>
        </div>
    </div>
</div>

<div class="container mt-5" id="appSection" style="max-width: 700px; display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">My Tasks</h2>
        <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="logout()">Logout</button>
    </div>
    
    <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
            <form id="taskForm" class="row g-3">
                <div class="col-md-6">
                    <label class="small fw-bold">Judul Tugas</label>
                    <input type="text" id="title" class="form-control" placeholder="Apa yang ingin dikerjakan?" required>
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold">Deadline</label>
                    <input type="date" id="deadline" class="form-control">
                </div>
                <div class="col-12">
                    <label class="small fw-bold">Deskripsi (Opsional)</label>
                    <textarea id="description" class="form-control" rows="2" placeholder="Detail tugas..."></textarea>
                </div>
                <div class="col-12 mt-3">
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-3">Tambah Tugas Baru</button>
                </div>
            </form>
        </div>
    </div>

    <div id="taskList"></div>
</div>

<script>
    const getToken = () => localStorage.getItem('jwt_token');
    const setToken = (token) => localStorage.setItem('jwt_token', token);
    const clearToken = () => localStorage.removeItem('jwt_token');

    window.onload = () => {
        if (getToken()) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            fetchTasks();
        }
    };

    function logout() {
        clearToken();
        location.reload();
    }

    async function handleAuth(endpoint) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (res.ok) {
            if(endpoint === '/api/login') {
                setToken(data.token);
                location.reload();
            } else { alert("Registrasi sukses! Silakan Login."); }
        } else { alert("Error: " + data.error); }
    }

    async function fetchTasks() {
        const res = await fetch('/api/tasks', { headers: {'Authorization': `Bearer ${getToken()}`} });
        if(res.status === 401) return logout();
        
        const data = await res.json();
        const container = document.getElementById('taskList');
        container.innerHTML = '';
        
        data.data.forEach(task => {
            const isDone = task.status === 'done';
            const isInProgress = task.status === 'in_progress';
            
            let statusClass = '';
            if (isDone) statusClass = 'task-done';
            else if (isInProgress) statusClass = 'task-inprogress';
            else if (task.is_overdue) statusClass = 'task-overdue';

            const overdueBadge = (task.is_overdue && !isDone) ? '<span class="badge bg-danger ms-2">OVERDUE</span>' : '';
            
            container.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center ${statusClass}">
                    <div style="max-width: 65%;">
                        <h6 class="mb-1 fw-bold ${isDone ? 'text-decoration-line-through text-muted' : ''}">
                            ${task.title} ${overdueBadge}
                        </h6>
                        <p class="mb-1 small text-muted text-truncate">${task.description || '<i>Tidak ada deskripsi</i>'}</p>
                        <small class="text-secondary"><i class="bi bi-calendar"></i> Deadline: ${task.deadline || '-'}</small>
                    </div>
                    <div class="d-flex align-items-center">
                        <select class="form-select form-select-sm me-2" style="width: 120px;" onchange="updateTask(${task.id}, this.value)">
                            <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                            <option value="done" ${task.status === 'done' ? 'selected' : ''}>Done</option>
                        </select>
                        <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteTask(${task.id})">✖</button>
                    </div>
                </div>
            `;
        });
    }

    document.getElementById('taskForm').onsubmit = async (e) => {
        e.preventDefault();
        const body = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            deadline: document.getElementById('deadline').value
        };
        
        const res = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
            body: JSON.stringify(body)
        });
        
        if(res.ok) {
            document.getElementById('taskForm').reset();
            fetchTasks();
        } else {
            const err = await res.json();
            alert("Error: " + err.error);
        }
    };

    async function updateTask(id, newStatus) {
        await fetch(`/api/tasks/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
            body: JSON.stringify({status: newStatus})
        });
        fetchTasks();
    }

    async function deleteTask(id) {
        if(confirm("Hapus tugas ini?")) {
            await fetch(`/api/tasks/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${getToken()}`}
            });
            fetchTasks();
        }
    }
</script>
</body>
</html>
