<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Task App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        :root { --primary-color: #4361ee; --success-color: #10b981; --danger-color: #ef4444; --warning-color: #f1c40f; --bg-soft: #f4f7fe; }
        body { background-color: var(--bg-soft); font-family: 'Plus Jakarta Sans', sans-serif; color: #2b2d42; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
        .stat-card { background: white; border-radius: 18px; padding: 15px; text-align: center; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .bg-total { background: #eef2ff !important; border-bottom: 4px solid var(--primary-color); color: var(--primary-color); }
        .bg-pending { background: #f8fafc !important; border-bottom: 4px solid #94a3b8; color: #475569; }
        .bg-active { background: #fffbeb !important; border-bottom: 4px solid var(--warning-color); color: #b45309; }
        .bg-done { background: #f0fdf4 !important; border-bottom: 4px solid var(--success-color); color: var(--success-color); }
        .list-group-item { border: none; border-radius: 16px !important; margin-bottom: 12px; padding: 16px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02); border-left: 6px solid #e2e8f0; }
        .task-done { border-left-color: var(--success-color) !important; background-color: #f0fdf4 !important; }
        .task-inprogress { border-left-color: var(--warning-color) !important; background-color: #fffbeb !important; }
        .task-overdue { border-left-color: var(--danger-color) !important; background-color: #fef2f2 !important; }
        .form-control, .form-select { border-radius: 12px; padding: 10px 15px; border: 2px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container mt-5" id="authSection" style="max-width: 400px;">
    <div class="card shadow-sm p-4 text-center">
        <h3 class="fw-bold text-primary mb-4">Task Manager</h3>
        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
        <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
        <button class="btn btn-primary w-100 mb-2" onclick="handleAuth('/api/login')">Login</button>
        <button class="btn btn-outline-secondary w-100 border-0" onclick="handleAuth('/api/register')">Daftar Akun</button>
    </div>
</div>

<div class="container mt-5" id="appSection" style="max-width: 750px; display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">My Productivity</h2>
        <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="logout()">Logout</button>
    </div>
    <div class="row g-3 mb-4" id="statsArea"></div>
    <div class="card shadow-sm mb-4 p-4">
        <form id="taskForm" class="row g-3">
            <div class="col-md-7"><label class="small fw-bold">Judul</label><input type="text" id="title" class="form-control" required></div>
            <div class="col-md-5"><label class="small fw-bold">Deadline</label><input type="date" id="deadline" class="form-control"></div>
            <div class="col-12"><label class="small fw-bold">Deskripsi</label><textarea id="description" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-success w-100 fw-bold mt-3">Tambah Tugas</button>
        </form>
    </div>
    <div id="taskList"></div>
</div>

<script>
    const getToken = () => localStorage.getItem('jwt_token');
    window.onload = () => { if (getToken()) { document.getElementById('authSection').style.display = 'none'; document.getElementById('appSection').style.display = 'block'; fetchTasks(); } };
    function logout() { localStorage.removeItem('jwt_token'); location.reload(); }

    async function handleAuth(endpoint) {
        const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value})});
        const data = await res.json();
        if (res.ok) { if(endpoint === '/api/login') { localStorage.setItem('jwt_token', data.token); location.reload(); } else { Swal.fire('Berhasil!', 'Silakan login.', 'success'); } }
        else { Swal.fire('Gagal', data.error, 'error'); }
    }

    function updateStats(tasks) {
        const s = { total: tasks.length, pending: 0, in_progress: 0, done: 0 };
        tasks.forEach(t => s[t.status]++);
        document.getElementById('statsArea').innerHTML = `
            <div class="col-3"><div class="stat-card bg-total"><h4>${s.total}</h4><span>Total</span></div></div>
            <div class="col-3"><div class="stat-card bg-pending"><h4>${s.pending}</h4><span>Pending</span></div></div>
            <div class="col-3"><div class="stat-card bg-active"><h4>${s.in_progress}</h4><span>Active</span></div></div>
            <div class="col-3"><div class="stat-card bg-done"><h4>${s.done}</h4><span>Done</span></div></div>`;
    }

    async function fetchTasks() {
        const res = await fetch('/api/tasks', { headers: {'Authorization': `Bearer ${getToken()}`} });
        const data = await res.json();
        updateStats(data.data);
        const container = document.getElementById('taskList');
        if (data.data.length === 0) { container.innerHTML = '<p class="text-center opacity-50">Kosong...</p>'; return; }
        container.innerHTML = '';
        data.data.forEach(task => {
            const isDone = task.status === 'done';
            const sClass = isDone ? 'task-done' : (task.status === 'in_progress' ? 'task-inprogress' : (task.is_overdue ? 'task-overdue' : ''));
            container.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center ${sClass}">
                    <div><h6 class="mb-0 ${isDone?'text-decoration-line-through text-muted':''}">${task.title}</h6><small class="text-muted">${task.description || ''}</small></div>
                    <div class="d-flex align-items-center">
                        <select class="form-select form-select-sm me-2" onchange="updateTask(${task.id}, this.value)">
                            <option value="pending" ${task.status==='pending'?'selected':''}>Pending</option>
                            <option value="in_progress" ${task.status==='in_progress'?'selected':''}>Active</option>
                            <option value="done" ${task.status==='done'?'selected':''}>Done</option>
                        </select>
                        <button class="btn btn-sm text-danger" onclick="deleteTask(${task.id})">✖</button>
                    </div>
                </div>`;
        });
    }

    document.getElementById('taskForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/tasks', { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`}, body: JSON.stringify({title: document.getElementById('title').value, description: document.getElementById('description').value, deadline: document.getElementById('deadline').value})});
        if(res.ok) { document.getElementById('taskForm').reset(); fetchTasks(); Swal.fire({toast:true, position:'top-end', icon:'success', title:'Ditambahkan', showConfirmButton:false, timer:1500}); }
    };

    async function updateTask(id, s) { await fetch(`/api/tasks/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`}, body: JSON.stringify({status: s})}); fetchTasks(); }
    async function deleteTask(id) { const r = await Swal.fire({title:'Hapus?', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444'}); if(r.isConfirmed) { await fetch(`/api/tasks/${id}`, {method:'DELETE', headers:{'Authorization':`Bearer ${getToken()}`}}); fetchTasks(); } }
</script>
</body>
</html>
